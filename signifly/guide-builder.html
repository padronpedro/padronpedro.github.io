<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide Builder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.css">
<style>
.ql-toolbar.ql-snow{border:none;border-bottom:1px solid #f0f0ec;padding:6px 10px;font-family:inherit}
.ql-container.ql-snow{border:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px}
.ql-editor{min-height:130px;padding:12px 16px;line-height:1.65;color:#1a1a18}
.ql-editor.ql-blank::before{color:#d3d1c7;font-style:normal;left:16px}
.ql-toolbar.ql-snow .ql-formats{margin-right:8px}
.ql-snow .ql-stroke{stroke:#888780}
.ql-snow .ql-fill{fill:#888780}
.ql-snow.ql-toolbar button:hover .ql-stroke,.ql-snow.ql-toolbar button.ql-active .ql-stroke{stroke:#1a1a18}
.ql-snow.ql-toolbar button:hover .ql-fill,.ql-snow.ql-toolbar button.ql-active .ql-fill{fill:#1a1a18}
.ql-snow.ql-toolbar button:hover,.ql-snow.ql-toolbar button.ql-active{color:#1a1a18}
.ql-snow.ql-toolbar button{border-radius:4px;padding:2px 4px}
.ql-snow.ql-toolbar button:hover{background:#f0f0ec}
.ql-editor ul,.ql-editor ol{padding-left:1.2em}
.ql-editor p{margin:0 0 2px}
.ql-editor li{padding-left:0.3em}
</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh}

header{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.logo{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;letter-spacing:-.01em}
.logo-dot{width:26px;height:26px;background:#1a1a18;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.header-actions{display:flex;gap:6px;align-items:center}
.divider{width:1px;height:20px;background:#e5e5e0;margin:0 4px}

.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #e5e5e0;background:#fff;color:#1a1a18;transition:background .12s,border-color .12s;font-family:inherit;white-space:nowrap}
.btn:hover{background:#f5f5f3;border-color:#d3d1c7}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
.btn.primary:hover{background:#333}
.btn.primary:disabled{opacity:.35}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:#f0f0ec;border-color:transparent}

.main{max-width:780px;margin:0 auto;padding:28px 24px 110px}

.empty{text-align:center;padding:64px 24px}
.empty-icon{width:56px;height:56px;border-radius:14px;background:#f0f0ec;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px}
.empty h2{font-size:17px;font-weight:600;margin-bottom:8px}
.empty p{font-size:13px;color:#888780;line-height:1.65;max-width:280px;margin:0 auto 20px}

.steps{display:flex;flex-direction:column;gap:12px}

.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;overflow:hidden;transition:box-shadow .18s,border-color .18s}
.card:focus-within{border-color:#b4b2a9;box-shadow:0 0 0 3px rgba(0,0,0,.06)}

.card-head{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fafaf8;border-bottom:1px solid #f0f0ec}
.badge{width:26px;height:26px;border-radius:50%;background:#1a1a18;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.title-input{flex:1;border:none;background:transparent;font-size:14px;font-weight:500;color:#1a1a18;outline:none;font-family:inherit}
.title-input::placeholder{color:#c4c2b9;font-weight:400}
.card-acts{display:flex;gap:1px;margin-left:auto}
.ic{width:27px;height:27px;border-radius:6px;border:none;background:transparent;color:#c4c2b9;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .1s,color .1s;line-height:1}
.ic:hover{background:#f0f0ec;color:#1a1a18}
.ic.del:hover{background:#FCEBEB;color:#A32D2D}

.card-body{display:grid;grid-template-columns:1fr 1fr}

.zone{border-right:1px solid #f0f0ec;padding:16px;min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:background .12s;gap:0}
.zone:hover:not(.has-img){background:#fafaf8}
.zone.drag-over{background:#f0f0ec !important}
.zone.active-zone{outline:2px solid #1a1a18;outline-offset:-2px}
.zone-placeholder{text-align:center;color:#c4c2b9;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px}
.zone-placeholder .zi{font-size:30px;color:#ddd}
.zone-placeholder p{font-size:12px;line-height:1.5;max-width:130px}
kbd{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;background:#f5f5f3;border:1px solid #e0e0da;color:#888780;font-family:inherit}
.zone-img{width:100%;max-height:200px;object-fit:contain;display:none;border-radius:4px}
.img-acts{position:absolute;top:8px;right:8px;display:none;gap:4px}
.img-acts button{background:#fff;border:1px solid #e5e5e0;border-radius:6px;width:26px;height:26px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888780;transition:background .1s}
.img-acts button:hover{background:#f0f0ec;color:#1a1a18}

.desc-side{display:flex;flex-direction:column;min-height:190px}

input[type=file]{display:none}

.bottom{position:fixed;bottom:0;left:0;right:0;padding:11px 20px;background:#fff;border-top:1px solid #e5e5e0;display:none;justify-content:space-between;align-items:center;gap:12px;z-index:90}
.step-count{font-size:13px;color:#888780}

.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .18s;white-space:nowrap;z-index:999}
.toast.show{opacity:1}

.overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.overlay.show{display:flex}
.spinner{width:32px;height:32px;border:2.5px solid #e5e5e0;border-top-color:#1a1a18;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay p{font-size:13px;color:#888780}

.cover-card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:16px 18px;margin-bottom:18px;display:flex;gap:16px;align-items:center}
.cover-preview{flex-shrink:0;width:110px;height:44px;display:flex;align-items:center}
.cover-preview svg{width:100%;height:100%;object-fit:contain}
.cover-fields{flex:1;min-width:0}
.cover-fields label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#b4b2a9;display:block;margin-bottom:5px}
.guide-title-input{width:100%;border:1px solid #e5e5e0;border-radius:7px;padding:8px 12px;font-size:14px;font-weight:500;color:#1a1a18;font-family:inherit;outline:none;background:#fff;transition:border-color .12s}
.guide-title-input:focus{border-color:#b4b2a9;box-shadow:0 0 0 3px rgba(0,0,0,.05)}
.guide-title-input::placeholder{font-weight:400;color:#c4c2b9}
.cover-hint{font-size:11px;color:#c4c2b9;margin-top:5px}

.orient-toggle{display:flex;gap:0;border:1px solid #e5e5e0;border-radius:7px;overflow:hidden;flex-shrink:0}
.orient-btn{padding:7px 13px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:#fff;color:#888780;font-family:inherit;transition:background .12s,color .12s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.orient-btn:first-child{border-right:1px solid #e5e5e0}
.orient-btn.active{background:#1a1a18;color:#fff}
.orient-icon{display:inline-block;border:1.5px solid currentColor;border-radius:1px}
.orient-icon.portrait{width:8px;height:11px}
.orient-icon.landscape{width:11px;height:8px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot">✦</div>
    Guide Builder
  </div>
  <div class="header-actions">
    <button class="btn ghost" onclick="triggerImport()" title="Import a .guide.json file">↑ Import</button>
    <button class="btn ghost" id="exportBtn" onclick="exportSteps()" disabled title="Export steps as shareable .guide.json">↓ Export</button>
    <div class="divider"></div>
    <button class="btn" onclick="addStep()">+ Add Step</button>
    <button class="btn primary" id="pdfBtn" onclick="generatePDF()" disabled>↓ Export PDF</button>
  </div>
</header>

<div class="main">

  <div class="cover-card">
    <div class="cover-preview">

    </div>
    <div class="cover-fields">
      <label for="guideTitle">Cover page title</label>
      <input class="guide-title-input" id="guideTitle" type="text" placeholder="e.g. How to update the navigation menu in Webflow" />
      <p class="cover-hint">Appears on the PDF cover page alongside your logo</p>
    </div>
    <div class="orient-toggle">
      <button class="orient-btn active" id="btnPortrait" onclick="setOrientation('portrait')">
        <span class="orient-icon portrait"></span> Portrait
      </button>
      <button class="orient-btn" id="btnLandscape" onclick="setOrientation('landscape')">
        <span class="orient-icon landscape"></span> Landscape
      </button>
    </div>
  </div>

  <div id="emptyState" class="empty">
    <div class="empty-icon">📸</div>
    <h2>Add your first step</h2>
    <p>Paste screenshots, write descriptions, then export as PDF — or import a saved guide to continue editing.</p>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn primary" onclick="addStep()">+ Add your first step</button>
      <button class="btn" onclick="triggerImport()">↑ Import guide</button>
    </div>
  </div>

  <div id="stepsList" class="steps"></div>

</div>

<div class="bottom" id="bottomBar">
  <span class="step-count" id="stepCount">0 steps</span>
  <div style="display:flex;gap:6px;align-items:center">
    <button class="btn ghost" onclick="triggerImport()">↑ Import</button>
    <button class="btn ghost" onclick="exportSteps()">↓ Export</button>
    <div class="divider"></div>
    <button class="btn" onclick="addStep()">+ Add Step</button>
    <button class="btn primary" onclick="generatePDF()">↓ PDF</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p id="overlayMsg">Generating your PDF…</p>
</div>

<input type="file" id="importFile" accept=".json" onchange="handleImport(event)" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>

<script>

async function svgToPng(svgStr, w, h) {
  return new Promise(resolve => {
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

let steps = [], idC = 0, activeZone = null, quillInstances = {}, orientation = 'portrait';
const $ = id => document.getElementById(id);
function uid() { return ++idC; }

function setOrientation(o) {
  orientation = o;
  $('btnPortrait').classList.toggle('active', o === 'portrait');
  $('btnLandscape').classList.toggle('active', o === 'landscape');
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function updateUI() {
  const has = steps.length > 0;
  $('emptyState').style.display = has ? 'none' : 'block';
  $('bottomBar').style.display = has ? 'flex' : 'none';
  $('stepCount').textContent = `${steps.length} step${steps.length !== 1 ? 's' : ''}`;
  $('pdfBtn').disabled = !has;
  $('exportBtn').disabled = !has;
}

function addStep() {
  const step = { id: uid(), title: '', description: '', img: null };
  steps.push(step);
  appendCard(step);
  updateUI();
  setTimeout(() => { const el = $(`step-${step.id}`); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 60);
}

function appendCard(step) {
  const idx = steps.indexOf(step) + 1;
  const div = document.createElement('div');
  div.className = 'card';
  div.id = `step-${step.id}`;
  div.innerHTML = cardHTML(step, idx);
  $('stepsList').appendChild(div);
  initQuill(step);
  if (step.img) {
    $(`img-${step.id}`).src = step.img;
    $(`img-${step.id}`).style.display = 'block';
    $(`ph-${step.id}`).style.display = 'none';
    $(`acts-${step.id}`).style.display = 'flex';
    $(`zone-${step.id}`).style.cursor = 'default';
  }
}

function cardHTML(step, idx) {
  return `
    <div class="card-head">
      <div class="badge" id="badge-${step.id}">${idx}</div>
      <input class="title-input" type="text" placeholder="Step title (optional)"
        value="${esc(step.title)}" oninput="steps.find(s=>s.id===${step.id}).title=this.value" />
      <div class="card-acts">
        <button class="ic" onclick="move(${step.id},-1)" title="Move up">↑</button>
        <button class="ic" onclick="move(${step.id},1)" title="Move down">↓</button>
        <button class="ic del" onclick="del(${step.id})" title="Delete">✕</button>
      </div>
    </div>
    <div class="card-body">
      <div class="zone" id="zone-${step.id}"
        onclick="focusZone(${step.id})"
        ondragover="dragOver(event,${step.id})"
        ondragleave="dragLeave(${step.id})"
        ondrop="drop(event,${step.id})">
        <div class="zone-placeholder" id="ph-${step.id}">
          <div class="zi">🖼️</div>
          <p>Click here then paste your screenshot</p>
          <kbd>Ctrl+V / ⌘V</kbd>
          <p style="font-size:11px;margin-top:2px">or drag & drop</p>
        </div>
        <img class="zone-img" id="img-${step.id}" />
        <div class="img-acts" id="acts-${step.id}">
          <button onclick="clearImg(event,${step.id})" title="Remove">✕</button>
          <button onclick="$('file-${step.id}').click()" title="Replace">⟳</button>
        </div>
      </div>
      <div class="desc-side">
        <div id="editor-${step.id}"></div>
      </div>
    </div>
    <input type="file" id="file-${step.id}" accept="image/*" onchange="fromFile(event,${step.id})" />`;
}

function rebuildAll() { quillInstances = {}; $('stepsList').innerHTML = ''; steps.forEach(s => appendCard(s)); updateUI(); }
function esc(s) { return (s||'').replace(/"/g,'&quot;'); }
function esc2(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function focusZone(id) {
  activeZone = id;
  document.querySelectorAll('.zone').forEach(z => z.classList.remove('active-zone'));
  const zone = $(`zone-${id}`);
  if (zone) { zone.classList.add('active-zone'); toast('Zone selected — paste (Ctrl+V / ⌘V)'); }
}

function dragOver(e, id) { e.preventDefault(); $(`zone-${id}`).classList.add('drag-over'); activeZone = id; }
function dragLeave(id) { $(`zone-${id}`).classList.remove('drag-over'); }
function drop(e, id) {
  e.preventDefault();
  $(`zone-${id}`).classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) readFile(file, id);
}
function fromFile(e, id) { const f = e.target.files[0]; if (f) readFile(f, id); }
function readFile(file, id) { const r = new FileReader(); r.onload = ev => setImg(id, ev.target.result); r.readAsDataURL(file); }

function setImg(id, data) {
  const step = steps.find(s => s.id === id);
  if (!step) return;
  step.img = data;
  $(`img-${id}`).src = data;
  $(`img-${id}`).style.display = 'block';
  $(`ph-${id}`).style.display = 'none';
  $(`acts-${id}`).style.display = 'flex';
  $(`zone-${id}`).style.cursor = 'default';
  $(`zone-${id}`).classList.remove('active-zone');
  activeZone = null;
}

function clearImg(e, id) {
  e.stopPropagation();
  const step = steps.find(s => s.id === id);
  if (!step) return;
  step.img = null;
  $(`img-${id}`).src = '';
  $(`img-${id}`).style.display = 'none';
  $(`ph-${id}`).style.display = 'flex';
  $(`acts-${id}`).style.display = 'none';
  $(`zone-${id}`).style.cursor = 'pointer';
  $(`file-${id}`).value = '';
}

function del(id) { delete quillInstances[id]; steps = steps.filter(s => s.id !== id); rebuildAll(); }
function move(id, dir) {
  const i = steps.findIndex(s => s.id === id), ni = i + dir;
  if (ni < 0 || ni >= steps.length) return;
  [steps[i], steps[ni]] = [steps[ni], steps[i]];
  rebuildAll();
}

document.addEventListener('paste', e => {
  if (!activeZone) return;
  for (const item of (e.clipboardData?.items || []))
    if (item.type.startsWith('image/')) { const f = item.getAsFile(); if (f) { readFile(f, activeZone); break; } }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.zone') && !e.target.closest('.ic')) {
    activeZone = null;
    document.querySelectorAll('.zone').forEach(z => z.classList.remove('active-zone'));
  }
});

// Drag a .json file onto the page to import
document.addEventListener('dragover', e => { if ([...e.dataTransfer.types].includes('Files')) e.preventDefault(); });
document.addEventListener('drop', e => {
  const file = [...e.dataTransfer.files].find(f => f.name.endsWith('.json'));
  if (file) { e.preventDefault(); parseImportFile(file); }
});


function initQuill(step) {
  const container = document.getElementById(`editor-${step.id}`);
  if (!container) return;
  const q = new Quill(container, {
    theme: 'snow',
    placeholder: 'Describe what to do in this step…',
    modules: {
      toolbar: [
        ['bold', 'italic', 'underline'],
        [{ list: 'ordered' }, { list: 'bullet' }],
        ['clean']
      ]
    }
  });
  if (step.description) q.clipboard.dangerouslyPasteHTML(step.description);
  q.on('text-change', () => {
    const s = steps.find(x => x.id === step.id);
    if (s) s.description = q.root.innerHTML === '<p><br></p>' ? '' : q.root.innerHTML;
  });
  quillInstances[step.id] = q;
}

function renderRichText(doc, html, x, startY, maxW, fontSize) {
  if (!html || !html.replace(/<[^>]+>/g, '').trim()) return startY;
  const div = document.createElement('div');
  div.innerHTML = html;
  const lh = fontSize * 0.352778 * 1.7;
  let y = startY;

  function getSegs(node) {
    const segs = [];
    (function walk(n, b, i) {
      if (n.nodeType === 3) {
        if (n.textContent) segs.push({ t: n.textContent, b, i });
      } else if (n.nodeType === 1) {
        const tag = n.tagName;
        n.childNodes.forEach(c => walk(c, b || tag === 'STRONG' || tag === 'B', i || tag === 'EM' || tag === 'I'));
      }
    })(node, false, false);
    return segs;
  }

  function renderBlock(node, prefix) {
    const segs = getSegs(node);
    let cx = x;
    let prefixW = 0;

    if (prefix) {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(fontSize);
      doc.text(prefix, cx, y, { baseline: 'top' });
      prefixW = doc.getTextWidth(prefix + ' ');
      cx += prefixW;
    }

    for (const seg of segs) {
      const style = seg.b && seg.i ? 'bolditalic' : seg.b ? 'bold' : seg.i ? 'italic' : 'normal';
      doc.setFont('helvetica', style);
      doc.setFontSize(fontSize);
      const tokens = seg.t.match(/\S+\s*/g) || [];
      for (const tok of tokens) {
        const tw = doc.getTextWidth(tok);
        if (cx + tw > x + maxW && cx > x + prefixW) {
          y += lh;
          cx = x + prefixW;
          doc.setFont('helvetica', style);
        }
        doc.text(tok, cx, y, { baseline: 'top' });
        cx += tw;
      }
    }
    y += lh;
  }

  for (const node of div.childNodes) {
    if (node.nodeType !== 1) continue;
    const tag = node.tagName;
    if (tag === 'P') {
      if (node.textContent.trim()) renderBlock(node, null);
      else y += lh * 0.4;
    } else if (tag === 'UL') {
      for (const li of node.children) renderBlock(li, '•');
    } else if (tag === 'OL') {
      let n = 1;
      for (const li of node.children) renderBlock(li, `${n++}.`);
    }
  }
  return y;
}

// ── Export ──
function exportSteps() {
  if (!steps.length) return;
  const payload = {
    version: 1,
    title: $('guideTitle').value.trim(),
    exportedAt: new Date().toISOString(),
    steps: steps.map(s => ({ title: s.title, description: s.description, img: s.img }))
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const slug = (payload.title || 'guide').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'guide';
  a.href = url; a.download = `${slug}.guide.json`; a.click();
  URL.revokeObjectURL(url);
  toast('Guide exported ✓');
}

// ── Import ──
function triggerImport() { $('importFile').click(); }
function handleImport(e) { const f = e.target.files[0]; if (f) parseImportFile(f); e.target.value = ''; }

function parseImportFile(file) {
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.steps || !Array.isArray(data.steps)) throw new Error('Invalid');
      if (steps.length && !confirm(`Replace your ${steps.length} current step${steps.length !== 1 ? 's' : ''} with the imported guide?`)) return;
      steps = []; idC = 0;
      if (data.title) $('guideTitle').value = data.title;
      data.steps.forEach(s => steps.push({ id: uid(), title: s.title||'', description: s.description||'', img: s.img||null }));
      rebuildAll();
      toast(`Imported ${steps.length} step${steps.length !== 1 ? 's' : ''} ✓`);
    } catch { toast('Invalid file — make sure it\'s a .guide.json exported from Guide Builder'); }
  };
  r.readAsText(file);
}

// ── PDF ──
async function generatePDF() {
  if (!steps.length) return;
  $('overlayMsg').textContent = 'Generating your PDF…';
  $('overlay').classList.add('show');
  await new Promise(r => setTimeout(r, 60));
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation });
    const isLandscape = orientation === 'landscape';
    const W = isLandscape ? 297 : 210;
    const H = isLandscape ? 210 : 297;
    const mg = 16, cw = W - mg * 2;
    const guideTitle = $('guideTitle').value.trim() || 'Step-by-Step Guide';

    // Cover
    const LOGO_W = 80, LOGO_H = Math.round(80 * (113/287));
    const logoX = (W - LOGO_W) / 2, logoY = H/2 - LOGO_H/2 - 18;
    const logoPng = await svgToPng(LOGO_SVG, 574, 226);
    if (logoPng) doc.addImage(logoPng, 'PNG', logoX, logoY, LOGO_W, LOGO_H);
    doc.setTextColor(20,20,18); doc.setFont('helvetica','bold'); doc.setFontSize(20);
    const titleLines = doc.splitTextToSize(guideTitle, 160);
    const titleY = logoY + LOGO_H + 16;
    doc.text(titleLines, W/2, titleY, { align: 'center' });

    // Steps
    for (let i = 0; i < steps.length; i++) {
      const s = steps[i];
      doc.addPage();

      // Fixed zones — 10% title / 50% image / 40% text of content area
      const contentH = H - mg * 2;
      const zTitle = mg;
      const hTitle = contentH * 0.10;
      const zImg   = zTitle + hTitle;
      const hImg   = contentH * 0.70;
      const zText  = zImg + hImg;
      const hText  = contentH * 0.20;

      // ── Title strip ──
      doc.setFillColor(240,240,236);
      doc.roundedRect(mg, zTitle, cw, hTitle, 3, 3, 'F');
      doc.setFillColor(26,26,24);
      doc.circle(mg + hTitle/2, zTitle + hTitle/2, hTitle * 0.38, 'F');
      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(12);
      doc.text(String(i+1), mg + hTitle/2, zTitle + hTitle/2, { align: 'center', baseline: 'middle' });
      doc.setTextColor(26,26,24); doc.setFontSize(13);
      doc.text(s.title || `Step ${i+1}`, mg + hTitle + 4, zTitle + hTitle/2, { baseline: 'middle' });

      // ── Image zone (50%) ──
      if (s.img) {
        try {
          const im = new Image();
          await new Promise(res => { im.onload = res; im.onerror = res; im.src = s.img; });
          const natW = im.naturalWidth || 800;
          const natH = im.naturalHeight || 500;

          // Scale to fill zone width; never exceed zone height
          const ratio = Math.min(cw / natW, hImg / natH);
          const iW = natW * ratio;
          const iH = natH * ratio;

          // Center image in zone
          const ix = mg + (cw - iW) / 2;
          const iy = zImg + (hImg - iH) / 2;

          // Lossless PNG for full quality
          const canvas = document.createElement('canvas');
          canvas.width = natW; canvas.height = natH;
          canvas.getContext('2d').drawImage(im, 0, 0);
          const pngData = canvas.toDataURL('image/png');

          doc.setDrawColor(220,220,215); doc.setLineWidth(0.3);
          doc.roundedRect(ix-1, iy-1, iW+2, iH+2, 2, 2);
          doc.addImage(pngData, 'PNG', ix, iy, iW, iH, undefined, 'NONE');
        } catch(e) { console.error(e); }
      } else {
        doc.setFillColor(248,248,246); doc.setDrawColor(210,210,205); doc.setLineWidth(0.3);
        doc.roundedRect(mg, zImg + 4, cw, hImg - 8, 3, 3, 'FD');
        doc.setTextColor(185,183,174); doc.setFont('helvetica','normal'); doc.setFontSize(10);
        doc.text('[ No screenshot ]', W/2, zImg + hImg/2, { align: 'center', baseline: 'middle' });
      }

      // ── Text zone (40%) ──
      if (s.description && s.description.replace(/<[^>]+>/g,'').trim()) {
        doc.setDrawColor(180,178,169); doc.setLineWidth(0.5);
        doc.line(mg, zText + 4, mg, zText + hText - 4);
        doc.setTextColor(30,30,25);
        renderRichText(doc, s.description, mg + 7, zText + 5, cw - 10, 11);
      }

      // ── Page footer ──
      doc.setTextColor(200,200,195); doc.setFontSize(9);
      doc.text(`${i+1} / ${steps.length}`, W/2, H-7, { align: 'center' });
    }

    const slug = guideTitle.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')||'guide';
    doc.save(`${slug}.pdf`);
    toast('PDF downloaded ✓');
  } catch(err) {
    console.error(err);
    toast('Something went wrong — check console');
  } finally {
    $('overlay').classList.remove('show');
  }
}
</script>
</body>
</html>
